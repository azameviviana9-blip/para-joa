<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Corazón roto que sana ❤️‍🩹</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(to top,#1f1c2c,#928dab);
overflow:hidden;
font-family:Arial;
color:white;
}

/* Corazón */
.heart{
position:relative;
width:120px;
height:110px;
transform: rotate(-45deg);
animation: latido 1.4s infinite;
margin-bottom:50px;
}

.half{
position:absolute;
width:60px;
height:95px;
background:#ff3b6b;
border-radius:60px 60px 0 0;
transition:2s;
}

.left{
left:60px;
transform:rotate(-45deg);
transform-origin:0 100%;
}

.right{
left:0;
transform:rotate(45deg);
transform-origin:100% 100%;
}

/* Corazón roto */
.broken .left{
transform:rotate(-45deg) translate(-35px,-10px);
}

.broken .right{
transform:rotate(45deg) translate(35px,-10px);
}

/* Se sana */
.healed .left,
.healed .right{
transform:rotate(0) translate(0);
}

@keyframes latido{
0%,100%{transform:rotate(-45deg) scale(1);}
50%{transform:rotate(-45deg) scale(1.08);}
}

button{
padding:14px 26px;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
background:white;
color:#ff3b6b;
}

#texto{
margin-top:30px;
font-size:24px;
max-width:700px;
padding:0 20px;
}

/* partículas */
.spark{
position:absolute;
font-size:20px;
animation:subir 4s linear infinite;
}

@keyframes subir{
from{transform:translateY(100vh);opacity:1;}
to{transform:translateY(-10vh);opacity:0;}
}
</style>
</head>
<body>

<h1>Nuestro amor sana todo ❤️‍🩹</h1>

<div class="heart broken" id="heart">
<div class="half left"></div>
<div class="half right"></div>
</div>

<button onclick="sanar()">Sanar mi corazón 💘</button>

<p id="texto">
A veces el amor duele... pero con vos también aprende a sanar.
</p>

<script>
function sanar(){
document.getElementById("heart").classList.remove("broken");
document.getElementById("heart").classList.add("healed");

document.getElementById("texto").innerHTML=
"Después de cada herida, te sigo eligiendo. "+
"Porque incluso un corazón roto vuelve a latir más fuerte con amor. ❤️";
}

function brillo(){
let s=document.createElement("div");
s.className="spark";
s.innerHTML="✨";
s.style.left=Math.random()*100+"vw";
document.body.appendChild(s);

setTimeout(()=>s.remove(),4000);
}

setInterval(brillo,400);
</script>

</body>
</html>
